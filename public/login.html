<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Integral - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="logo-container">
                <span class="logo-icon">⚡</span>
                <h1 class="logo-text">Edu Integral</h1>
            </div>
            <p class="subtitle">Plataforma de Monitoreo IoT</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" value="admin@edu.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" value="1234" required>
            </div>

            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
        </form>

        <div class="login-footer">
            <p>Credenciales de prueba: admin@edu.com / 1234</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
