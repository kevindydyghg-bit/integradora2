<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Integral - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="logo-container">
                <span class="logo-icon">⚡</span>
                <h1 class="logo-text">Edu Integral</h1>
            </div>
            <p class="subtitle">Plataforma de Monitoreo IoT</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" value="admin@edu.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" value="1234" required>
            </div>

            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
        </form>

        <div class="login-footer">
            <p>Credenciales de prueba: admin@edu.com / 1234</p>
        </div>
    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (email === 'admin@edu.com' && password === '1234') {
            // ¡AQUÍ ESTÁ LA MAGIA! Lo mandamos a la nueva vista del docente
            window.location.href = '../app/views/docente/dashboard.html';
        } else if (email === 'alumno@edu.com' && password === '1234') {
            // Si entra un alumno, lo mandamos a la vista de PC del alumno
            window.location.href = '../app/views/alumno/app_alumno.html';
        } else {
            alert('⚠️ Credenciales incorrectas.');
        }
    });
</script>
</body>
</html>
