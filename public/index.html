<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Integral - Bienvenida</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/estilos.css"> </head>
<body>

    <main class="contenedor-principal">
        
        <section id="pantalla-bienvenida" class="tarjeta-activa">
        <img src="img/logo.png" alt="Logo Edu Integral" class="logo-bienvenida">            <h1 class="titulo-bienvenida">¡Hola! Bienvenido a tu clase</h1>
            <p class="texto-apoyo">Estamos listos para aprender hoy.</p>
            <button id="btn-mostrar-login" class="boton-primario gigante">Entrar</button>
        </section>

        <section id="pantalla-login" class="tarjeta-oculta">
            <h2 class="titulo-bienvenida">¿Quién eres?</h2>
            
            <form id="formulario-login">
                <div class="grupo-input">
                    <label for="nombreUsuario">Tu nombre completo</label>
                    <input type="text" id="nombreUsuario" name="nombreUsuario" placeholder="Ejemplo: Juan Pérez" required autocomplete="off">
                </div>

                <div class="grupo-input">
                    <label for="passwordUsuario">Tu contraseña</label>
                    <input type="password" id="passwordUsuario" name="passwordUsuario" placeholder="Escribe tu contraseña" required>
                </div>

                <div class="botones-accion">
                    <button type="button" id="btn-volver" class="boton-secundario">Volver</button>
                    <button type="submit" class="boton-primario">Iniciar Sesión</button>
                </div>
            </form>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
